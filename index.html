<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="title">Smart Shopping List</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js')</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <div class="header-row">
            <h1>🛒 <span data-i18n="appTitle">Shopping List</span></h1>
            <div class="header-actions">
                <button class="btn-outline btn-sm" onclick="toggleShoppingMode()" id="shoppingToggle" title="Shopping mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></button>
                <button class="btn-outline btn-sm" onclick="toggleTheme()" id="themeToggle" title="Dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
                <button class="btn-outline btn-sm" onclick="exportData()" title="Export"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
                <button class="btn-outline btn-sm" onclick="document.getElementById('importInput').click()" title="Import"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
                <input type="file" id="importInput" accept=".json" onchange="importData(event)">
                <button id="langToggle" class="btn-outline btn-sm" title="Language"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="langLabel" style="font-size:0.7rem;margin-left:2px">EN</span></button>
            </div>
        </div>
        <p data-i18n="appDesc">Keep track of your shopping</p>
    </header>

    <div class="filter-section">
        <input type="text" id="filterInput" oninput="filterLists()" data-i18n-placeholder="filterPlaceholder" placeholder="Search lists or items…">
    </div>

    <div class="input-section-wrap" id="inputWrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <span style="font-size:0.75rem;color:var(--muted)" data-i18n="addItems">Add Items</span>
            <button class="collapse-toggle collapsed" id="collapseToggle" onclick="toggleInput()" title="Toggle input"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
        </div>
        <div class="card input-section">
            <div class="grid-inputs">
            <div class="input-group full">
                <label data-i18n="listName">List Name</label>
                <input type="text" id="listName" data-i18n-placeholder="listNamePlaceholder" placeholder="e.g. Grocery, Tech" list="saved-lists">
                <datalist id="saved-lists"></datalist>
            </div>
            <div class="input-voice-row">
                <div class="input-group">
                    <label data-i18n="itemName">Item</label>
                    <input type="text" id="itemName" data-i18n-placeholder="itemPlaceholder" placeholder="e.g. Milk" list="saved-items">
                    <datalist id="saved-items"></datalist>
                    <p class="voice-hint" id="voiceHint"></p>
                </div>
                <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()" title="Voice input"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
            </div>
            <div class="input-group">
                <label data-i18n="price">Price ($)</label>
                <input type="number" id="itemPrice" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="input-group">
                <label data-i18n="quantity">Qty</label>
                <input type="number" id="itemQty" min="1" value="1">
            </div>
        </div>
        <button onclick="addItem()" class="btn-block" data-i18n="addToList">Add to List</button>
        </div>
    </div>

    <div id="listsDisplay" class="lists-container"></div>

    <div id="exitShoppingMode">
        <span data-i18n="shoppingModeOn">Shopping mode is on</span>
        <button onclick="toggleShoppingMode()" data-i18n="exitShoppingMode">Exit</button>
    </div>
</div>

<button class="fab" id="fab" onclick="toggleInput()" title="Add item"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<div id="toastContainer" class="toast-container"></div>

<script src="script.js" defer></script>
</body>
</html>
